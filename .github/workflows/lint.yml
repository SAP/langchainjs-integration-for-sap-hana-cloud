name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint src
        run: pnpm lint

      - name: Check formatting (src)
        run: pnpm format:check

      - name: Lint tests
        run: pnpm lint:tests

      - name: Check formatting (tests)
        run: pnpm format:tests:check

      - name: Lint examples
        run: pnpm lint:examples

      - name: Check formatting (examples)
        run: pnpm format:examples:check
